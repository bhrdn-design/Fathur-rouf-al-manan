<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Digital Falak - Fathur Ro'uf al-Manan</title>
  <style>
    :root {
      --ink: #111;
      --muted: #555;
      --line: #333;
      --soft: #f9f9f9;
      --panel: #fff;
      --accent: #eaeaea;
      --warn: #fff6d6;
      --bad: #ffe5e5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: Arial, sans-serif;
      background: #e4e4e4;
      line-height: 1.4;
    }
    .arabic, [dir="rtl"] {
      font-family: "Amiri", "Scheherazade New", "Times New Roman", serif;
      direction: rtl;
      unicode-bidi: isolate;
    }
    .page {
      width: min(1300px, 100%);
      margin: 0 auto;
      padding: 16px;
    }
    .app-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
      padding: 16px;
    }
    h1, h2, h3 { margin: 0 0 12px; text-align: center; }
    h1 { font-size: 20px; }
    h2 { font-size: 16px; border-bottom: 2px solid var(--ink); padding-bottom: 8px; }
    h3 { font-size: 15px; background: var(--accent); padding: 4px; border-radius: 4px; border: 1px solid #aaa; }
    .title-arabic { font-size: 28px; line-height: 1.3; margin-top: 8px; font-weight: bold; }
    .sub-arabic { font-size: 22px; line-height: 1.2; margin-bottom: 16px; }
    
    /* Form Input */
    label { display: block; font-weight: bold; font-size: 13px; margin: 12px 0 4px; }
    input, select, button {
      font: inherit;
      width: 100%;
      border: 1px solid #999;
      border-radius: 6px;
      padding: 8px;
      background: #fff;
    }
    input:focus, select:focus { outline: 2px solid #111; }
    .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .row4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1.2fr; gap: 6px; }
    .actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 20px; }
    button { cursor: pointer; font-weight: bold; background: #111; color: #fff; border: none; transition: 0.2s; }
    button:hover { background: #333; }
    button.secondary { background: #e0e0e0; color: #111; border: 1px solid #999; }
    button.secondary:hover { background: #ccc; }
    button.warn { background: #555; color: #fff; }
    
    .status-box, .error-box {
      display: none;
      margin-top: 12px; padding: 10px;
      border-radius: 6px; font-size: 13px;
      border: 1px solid #bbb;
    }
    .error-box { background: var(--bad); border-color: #c66; color: #900; font-weight: bold; }
    
    /* Area Hasil */
    #hasilArea {
      background: #fff;
      border: 1px solid #bbb;
      padding: 24px;
      border-radius: 12px;
      min-height: 800px;
    }
    .report-head { text-align: center; margin-bottom: 20px; }
    
    /* Tabel Utama */
    table { border-collapse: collapse; width: 100%; margin-bottom: 12px; background: #fff; }
    th, td { border: 1px solid var(--line); padding: 6px; vertical-align: middle; text-align: center; }
    th { background: var(--accent); font-weight: bold; }
    .main-table { font-size: 13px; table-layout: fixed; }
    .main-table .rowlabel { text-align: right; font-size: 15px; white-space: nowrap; font-weight: bold; width: 25%; }
    .num { font-variant-numeric: tabular-nums; font-family: monospace; font-size: 14px; }
    
    /* 8 Kotak Kecil */
    .boxes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
    }
    .mini-box {
      border: 2px solid var(--line);
      padding: 8px;
      background: var(--soft);
      border-radius: 8px;
      overflow-x: auto; /* Mencegah tabel sempit terpotong */
    }
    .mini-box table { font-size: 12px; margin-bottom: 0; }
    .mini-box td, .mini-box th { padding: 4px; }
    .mini-box .label { text-align: right; font-size: 14px; font-weight: bold; width: 45%; }
    
    /* Kotak 8 yang lebar */
    .box-8 {
      grid-column: span 3; /* Supaya lebar penuh di bawah */
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .box-8 table { height: 100%; }

    /* Keterangan Kesimpulan */
    .keterangan {
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 16px;
      margin-top: 24px;
      background: #fff;
    }
    .ket-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
    .ket-grid { display: grid; grid-template-columns: 260px 1fr; gap: 8px 12px; font-size: 14px; }
    .ket-grid b { text-align: left; }
    .conclusion {
      margin-top: 16px;
      padding: 12px;
      background: #eef8ee;
      border: 1px solid #8c8;
      font-weight: bold;
      font-size: 15px;
      border-radius: 6px;
      text-align: justify;
    }

    /* Print styling */
    @media print {
      body { background: #fff; }
      .page { width: 100%; padding: 0; }
      .input-panel { display: none !important; }
      .app-grid { display: block; }
      #hasilArea { border: 0; padding: 0; box-shadow: none; }
      .boxes { grid-template-columns: repeat(3, 1fr); }
      .box-8 { grid-column: span 3; }
    }

    @media (max-width: 900px) {
      .app-grid { grid-template-columns: 1fr; }
      .boxes { grid-template-columns: 1fr; }
      .box-8 { grid-column: span 1; grid-template-columns: 1fr; }
      .main-table { font-size: 11px; }
      .main-table .rowlabel { width: auto; white-space: normal; }
    }
  </style>
</head>

  <div class="page">
    <div class="app-grid">
      
      <section class="panel input-panel">
        <h2>Input Data Falak</h2>
        
        <label for="markaz">Nama Markaz / Tempat</label>
        <input id="markaz" type="text" placeholder="Contoh: Demak">
        
        <label>Lintang Tempat (DMS)</label>
        <div class="row4">
          <input id="latD" type="number" placeholder="Derajat">
          <input id="latM" type="number" min="0" max="59" placeholder="Menit">
          <input id="latS" type="number" min="0" max="59" placeholder="Detik">
          <select id="latDir"><option value="S">Selatan</option><option value="U">Utara</option></select>
        </div>
        
        <label>Bujur Tempat (DMS)</label>
        <div class="row4">
          <input id="lonD" type="number" placeholder="Derajat">
          <input id="lonM" type="number" min="0" max="59" placeholder="Menit">
          <input id="lonS" type="number" min="0" max="59" placeholder="Detik">
          <select id="lonDir"><option value="T">Timur</option><option value="B">Barat</option></select>
        </div>
        
        <label for="zona">Zona Waktu</label>
        <select id="zona">
          <option value="7">WIB (+7)</option>
          <option value="8">WITA (+8)</option>
          <option value="9">WIT (+9)</option>
        </select>
        
        <label for="bulanHijri">Awal Bulan Hijriyah (Target)</label>
        <select id="bulanHijri">
          <option value="0">Muharram</option>
          <option value="1">Safar</option>
          <option value="2">Rabiul Awal</option>
          <option value="3">Rabiul Akhir</option>
          <option value="4">Jumadil Awal</option>
          <option value="5">Jumadil Akhir</option>
          <option value="6">Rajab</option>
          <option value="7">Sya'ban</option>
          <option value="8">Ramadhan</option>
          <option value="9">Syawal</option>
          <option value="10">Zulkaidah</option>
          <option value="11">Zulhijjah</option>
        </select>
        
        <label for="tahunHijri">Tahun Hijriyah</label>
        <input id="tahunHijri" type="number" placeholder="Contoh: 1446">
        
        <div class="actions">
          <button id="btnHitung" onclick="prosesHitung()">Hitung Ijtima'</button>
          <button id="btnContoh" class="secondary" onclick="isiContohData()">Isi Contoh (Ramadhan 1446 H)</button>
          <button id="btnPrint" class="warn" onclick="window.print()">Cetak PDF / Print</button>
        </div>
        
        <div id="errorBox" class="error-box"></div>
      </section>

      <main id="hasilArea">
        <div class="report-head">
          <div class="arabic title-arabic">معرفة الاجتماع لمعرفة أول الشهر</div>
          <div class="arabic sub-arabic">على طريقة فتح الرؤف المنان</div>
          <h1 id="judulLembar">Ijtima' Akhir Bulan ...</h1>
        </div>
        
        <div id="resultContent">
          <div style="text-align: center; color: #666; padding: 50px;">Silakan isi formulir dan klik Hitung Ijtima'.</div>
        </div>
      </main>

    </div>
  </div>

    // Basis 60 math helpers
    function t2m(o) { return (Number(o.m||0) % 7) * 24 * 60 + Number(o.sa||0) * 60 + Number(o.da||0); }
    function m2t(totalMins) {
      const cyc = 7 * 24 * 60;
      totalMins = ((Math.round(totalMins) % cyc) + cyc) % cyc;
      const days = Math.floor(totalMins / (24 * 60));
      totalMins -= days * 24 * 60;
      const hours = Math.floor(totalMins / 60);
      const mins = totalMins - hours * 60;
      return { m: days === 0 ? 7 : days, sa: hours, da: mins };
    }
    
    function a2m(o) { return (Number(o.b||0)*30 + Number(o.d||0)) * 60 + Number(o.m||0); }
    function m2a(totalMins) {
      const cyc = 12 * 30 * 60;
      totalMins = ((Math.round(totalMins) % cyc) + cyc) % cyc;
      const b = Math.floor(totalMins / (30 * 60));
      totalMins -= b * 30 * 60;
      const d = Math.floor(totalMins / 60);
      const m = totalMins - d * 60;
      return { b, d, m };
    }

    // Hijri <-> Gregorian conversions for exact weekday alignment
    function hijriToGregorian(y, m, d) {
        let jd = Math.floor((11 * y + 3) / 30) + 354 * y + 30 * m - Math.floor((m - 1) / 2) + d + 1948440 - 385;
        let l = jd + 68569;
        let n = Math.floor((4 * l) / 146097);
        l = l - Math.floor((146097 * n + 3) / 4);
        let i = Math.floor((4000 * (l + 1)) / 1461001);
        l = l - Math.floor((1461 * i) / 4) + 31;
        let j = Math.floor((80 * l) / 2447);
        let day = l - Math.floor((2447 * j) / 80);
        l = Math.floor(j / 11);
        let month = j + 2 - 12 * l;
        let year = 100 * (n - 49) + i + l;
        return new Date(Date.UTC(year, month - 1, day));
    }
    
    function getExactIjtimaDate(hijriYear, monthIndex, alamahDayCode) {
        // Find approximate end of current month
        let tamMonth = monthIndex; 
        let tamYear = hijriYear;
        if (tamMonth === 0) { tamMonth = 12; tamYear -= 1; }
        let approxDate = hijriToGregorian(tamYear, tamMonth, 29);
        
        // JS Day: 0=Ahad.. 6=Sabtu
        const jsTarget = alamahDayCode === 7 ? 6 : alamahDayCode;
        let bestDate = approxDate;
        for (let offset = -5; offset <= 5; offset++) {
            let testDate = new Date(approxDate.getTime() + offset * 86400000);
            if (testDate.getUTCDay() === jsTarget) {
                bestDate = testDate;
                if (Math.abs(offset) <= 3) break;
            }
        }
        return { y: bestDate.getUTCFullYear(), m: bestDate.getUTCMonth() + 1, d: bestDate.getUTCDate(), full: bestDate };
    }
    
    function getPasaran(dateObjFull) {
        const days = Math.floor(dateObjFull.getTime() / 86400000);
        const arr = ["Wage", "Kliwon", "Legi", "Pahing", "Pon"];
        return arr[((days % 5) + 5) % 5];
    }
    
    function addDays(dateObjFull, days) {
        let n = new Date(dateObjFull.getTime() + days * 86400000);
        return { y: n.getUTCFullYear(), m: n.getUTCMonth() + 1, d: n.getUTCDate(), full: n };
    }

    // Interpolation Engine Kitab (Ta'dil Baina as-Satroini)
    function runInterpolation(tableName, madkhulBuruj, madkhulDeg, madkhulMin, step) {
        const lowerDeg = madkhulDeg - (madkhulDeg % step);
        let upperDeg = lowerDeg + step;
        let madkhulBurujUpper = madkhulBuruj;
        if (upperDeg >= 30) { upperDeg = 0; madkhulBurujUpper = (madkhulBurujUpper + 1) % 12; }
        
        const s1 = DATA_KITAB[tableName].get(madkhulBuruj, lowerDeg);
        const s2 = DATA_KITAB[tableName].get(madkhulBurujUpper, upperDeg);
        
        const v1 = (s1.d||0)*3600 + (s1.m||0)*60 + (s1.s||0);
        const v2 = (s2.d||0)*3600 + (s2.m||0)*60 + (s2.s||0);
        const fadhlSec = Math.abs(v1 - v2);
        
        const remMin = (madkhulDeg % step) * 60 + madkhulMin;
        const rangeMin = step * 60;
        
        // Aturan Fathur Rouf: pembulatan Math.floor (dipotong ke bawah / truncation)
        const dharbSec = Math.floor(fadhlSec * (remMin / rangeMin));
        
        let mathlubSec;
        if (v1 > v2) mathlubSec = v1 - dharbSec;
        else if (v1 < v2) mathlubSec = v1 + dharbSec;
        else mathlubSec = v1;
        
        const toDMS = (sec) => ({ d: Math.floor(sec/3600), m: Math.floor((sec%3600)/60), s: sec%60 });
        
        return {
            s1: toDMS(v1),
            s2: toDMS(v2),
            fadhl: toDMS(fadhlSec),
            dharb: toDMS(dharbSec),
            mathlub: toDMS(mathlubSec),
            madkhulBaseD: lowerDeg,
            remMin: remMin,
            // For Box 4 Kasr visual format
            kasrDeg: Math.floor(remMin/60),
            kasrMin: remMin % 60
        };
    }
